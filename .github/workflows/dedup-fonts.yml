name: Dedup fonts site-wide - un seul fichier de fonts partage
on:
  push:
    branches: [bot/dedupfonts]
permissions:
  contents: write
jobs:
  transform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Mutualiser les fonts sur un seul fichier partage (depuis main)
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions (dedup-fonts)"
          git fetch origin main
          git checkout -B fix/dedup-fonts origin/main
          echo '' | base64 -d > /tmp/dedup_fonts.py
          python3 /tmp/dedup_fonts.py
          git add -A
          git commit -q -m "Perf : mutualiser les fonts sur un seul fichier partage (cache une seule fois)" -m "Les 74 pages pointent vers un fichier de fonts unique (c_eda8729082dd.css?b=202607081413). Le bloc :root + body{font-family:var(--fb)} de x_90f01eb56902.css est extrait dans c_ac3d961d5d38.css (charge par les 38 pages concernees). x_90f01eb56902.css (doublon-de 139 Ko) supprime. Rendu strictement identique verifie (parite computed-style sur les 42 pages modifiees)."
          git push -f origin fix/dedup-fonts
