name: Hero SVG accueil - fond Flux energetique
on:
  push:
    branches: [bot/herosvg]
permissions:
  contents: write
jobs:
  transform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Appliquer le fond SVG sur le hero de l'accueil depuis main
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions (hero-svg)"
          git fetch origin main
          git checkout -B fix/hero-svg-accueil origin/main
          echo '' | base64 -d > /tmp/apply_hero_svg.py
          python3 /tmp/apply_hero_svg.py
          git add -A
          git commit -q -m "Accueil : fond SVG local Flux energetique sur le hero" -m "Remplace le diaporama photo par une illustration SVG 100% locale. Reversible."
          git push -f origin fix/hero-svg-accueil
